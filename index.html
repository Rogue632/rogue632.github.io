<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header pb-5">
      <nav class="navbar navbar-expand-l">
          <div class="container">
            <i class="fa-solid fa-magnifying-glass fa-xl" style="color: #ffffff;"></i>
            <p class="h1">Home</p>
            <button class="navbar-toggler border-0 custom-toggler ps-0 pt-0 align-self-start" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample" aria-controls="offcanvasExample">
              <span class="toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
              <div class="offcanvas-header">
                <!-- <h5 class="offcanvas-title" id="offcanvasExampleLabel">Offcanvas</h5> -->
                
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
              </div>
              <div class="offcanvas-body">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="podcasts.html">Podcasts</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="lectures.html">The Reith Lectures</a>
                  </li>
                </ul>
                </div>
              </div>
            </div>
          </div>
      </nav>
    </header>
    <main class="main">
      <div id="carouselExampleAutoplaying" class="carousel slide custom-carousel" data-bs-ride="carousel">
          <div class="container">
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="img/slider.png" class="d-block w-100" alt="...">
              </div>
              <div class="carousel-item">
                <img src="img/slider.png" class="d-block w-100" alt="...">
              </div>
              <div class="carousel-item">
                <img src="img/slider.png" class="d-block w-100" alt="...">
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        </div>
        <section class="gallery-section py-4">
          <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="gallery-title fs-4 mb-0">RECENTLY PLAYED</h4>
            <p class="mb-0">
              <a href="#" class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">All<i class="fa-solid fa-arrow-right"></i></a>
            </p>
          </div>
            <div class="gallery-container">
              <div class="gallery-wrapper">
                <img src="img/gallery-img.png" alt="Image 1" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 2" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 2" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
                <!-- Добавьте больше изображений по необходимости -->
              </div>
            </div>
          </div>
        </section>
        <section class="gallery-section py-4">
          <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="gallery-title fs-4 mb-0">LATEST RADIO</h4>
            <p class="mb-0" >
              <a href="#" class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">All</a>
            </p>
          </div>
            <div class="gallery-container">
              <div class="gallery-wrapper">
                <img src="img/gallery-img.png" alt="Image 1" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 2" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 2" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
                <!-- Добавьте больше изображений по необходимости -->
              </div>
            </div>
          </div>
        </section>
        <section class="gallery-section py-4">
          <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="gallery-title fs-4 mb-0">NEW</h4>
            <p class="mb-0">
              <a href="#" class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">All</a>
            </p>
          </div>
            <div class="gallery-container">
              <div class="gallery-wrapper">
                <img src="img/gallery-img.png" alt="Image 1" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 2" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 2" class="gallery-image img-fluid">
                <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
                <!-- Добавьте больше изображений по необходимости -->
              </div>
            </div>
          </div>
        </section>
    </main>
    <footer class="music-player-footer position-sticky py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="player-info">
          <div class="artist-name">Group Name</div>
          <div class="track-name">Track Title</div>
        </div>
        <div class="player-controls d-flex align-items-center">
          <button class="btn control-btn"><i class="fa-solid fa-backward-step" style="color: #9d6da1;"></i></button>
          <button class="btn rounded-circle"><i class="fa-solid fa-play" style="color: #8f129a;"></i></button>
          <button class="btn control-btn"><i class="fa-solid fa-forward-step" style="color: #9d6da1;"></i></button>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>      
</body>
</html>
