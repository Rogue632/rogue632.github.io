<!DOCTYPE html>
<html lang="en">
  <head>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  </head>
  <body >

      <nav class="navbar navbar-expand-l">
          <div class="container">
            <div class="search-container position-relative">
              <i class="fa-solid fa-magnifying-glass fs-3" id="search-icon" style="cursor: pointer;"></i>
              <input type="text" id="search-input" class="form-control" placeholder="Search...">
            </div>
            <p class="h1">Home</p>
            <button class="navbar-toggler border-0 custom-toggler ps-0 pt-0 align-self-start" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasExample" aria-controls="offcanvasExample">
              <span class="toggler-icon"></span>
            </button>
            <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
              <div class="offcanvas-header">
                <i class="fa-solid fa-radio fa-2xl me-3" style="color:#8f129a;"></i>
                <a href="index.html" class="nav-link fw-bold fs-4" style="color: #8f129a;" id="offcanvasExampleLabel">Our Name</a>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
              </div>
              <div class="offcanvas-body">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link active fw-bold underline rounded-3" aria-current="page" href="#"><i class="fa-solid fa-house me-1" style="width: 20px; color: #9d6da1;"></i>Home</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active fw-bold" aria-current="page" href="podcasts.html"><i class="fa-solid fa-headphones me-2" style="width: 20px; color:#9d6da1;"></i>Podcasts</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active fw-bold" aria-current="page" href="lectures.html"><i class="fa-solid fa-book-open me-2" style="width: 20px; color:#9d6da1;"></i>Lectures</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active fw-bold" aria-current="page" href="latest.html"><i class="fa-solid fa-list me-2" style="width: 20px; color:#9d6da1;"></i>Latest</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active fw-bold" aria-current="page" href="about.html"><i class="fa-solid fa-users me-2" style="width: 20px; color:#9d6da1;"></i>About us</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active fw-bold" aria-current="page" href="#"><i class="fa-solid fa-user me-2" style="width: 20px; color:#9d6da1;"></i>Profile</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link active fw-bold" aria-current="page" href="#"><i class="fa-solid fa-gear me-2" style="width: 20px; color:#9d6da1;"></i>Settings</a>

                  <li class="nav-item">
                    <a class="nav-link active fw-bold" aria-current="page" href="#"><i class="fa-solid fa-right-from-bracket me-2" style="width: 20px; color:#9d6da1;"></i>Logout</a>
                  </li>
                </ul>
                </div>
              </div>
            </div>
          </div>
      </nav>
    </header>
    <main class="main-margin">
      <div class="player flex-column pt-3">
        <div class="container">
          <div class="row flex-column position-relative">
            <div class="col mb-4">
              <img src="img/slider.png" class="rounded-3" style="height: 280px;" alt="">
            </div>
            <div class="col text-white text-center mb-4">
              <h5 class="mb-2">Europa Plus FM</h5>
              <p class="mb-4">Music</p>
              <div class="mb-4">
                <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                <i class="fa-regular fa-star" style="color: #9e69a7;"></i>
              </div>
              <h6 class="mb-2">Angelina Show - Go Home</h6>
            </div>
            <div class="col text-center mb-3">
              <button class="btn rounded-circle" style="width: 80px; height: 80px; background-color: white; border: none;">
                <i class="fa-solid fa-play fa-2xl ps-2" style="color: #8f129a; font-size: 2.5rem;"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="player-nav d-flex justify-content-around align-items-center mt-auto py-3">
          <a href="index.html" class="text-white"><i class="fa-solid fa-house"></i></a>
          <a href="latest.html" class="text-white"><i class="fa-solid fa-list"></i></a>
          <a href="podcasts.html" class="text-white"><i class="fa-solid fa-headphones"></i></a>
          <a href="#" class="text-white"><i class="fa-solid fa-user"></i></a>
        </div>
      </div>
      <div id="carouselExampleAutoplaying" class="carousel slide custom-carousel" data-bs-ride="carousel">
          <div class="container">
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="img/slider.png" class="d-block w-100 h-200 rounded-4" alt="">
              </div>
              <div class="carousel-item">
                <img src="img/podcast-img-2.png" class="d-block w-100 h-200 rounded-4" alt="">
              </div>
              <div class="carousel-item">
                <img src="img/podcast-img-2.png" class="d-block w-100 h-200 rounded-4" alt="">
              </div>
              <div class="carousel-item">
                <img src="img/gallery-img-2.png" class="d-block w-100 h-200 rounded-4" alt="">
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
      </div>
      <section class="gallery-section py-4">
        <div class="container">
          <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="gallery-title fs-4 mb-0">RECENTLY PLAYED</h4>
          <p class="mb-0">
            <a href="#" class="link-secondary link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover">All<i class="fa-solid fa-arrow-right ms-2"></i></a>
          </p>
        </div>
          <div class="gallery-container">
            <div class="gallery-wrapper">
              <img src="img/gallery-img.png" alt="Image 1" class="gallery-image img-fluid">
              <img src="img/gallery-img-2.png" alt="Image 2" class="gallery-image img-fluid">
              <img src="img/podcast-img-2.png" alt="Image 3" class="gallery-image img-fluid">
              <img src="img/gallery-img-2.png" alt="Image 2" class="gallery-image img-fluid">
              <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
            </div>
          </div>
        </div>
      </section>
      <section class="gallery-section py-4">
        <div class="container">
          <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="gallery-title fs-4 mb-0">LATEST RADIO</h4>
          <p class="mb-0">
            <a href="#" class="link-secondary link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover">All<i class="fa-solid fa-arrow-right ms-2"></i></a>
          </p>
        </div>
          <div class="gallery-container">
            <div class="gallery-wrapper">
              <img src="img/gallery-img.png" alt="Image 1" class="gallery-image img-fluid">
              <img src="img/gallery-img-2.png" alt="Image 2" class="gallery-image img-fluid">
              <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
              <img src="img/gallery-img-2.png" alt="Image 2" class="gallery-image img-fluid"> 
              <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
            </div>
          </div>
        </div>
      </section>
      <section class="gallery-section py-4">
        <div class="container">
          <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="gallery-title fs-4 mb-0">NEW</h4>
          <p class="mb-0">
            <a href="#" class="link-secondary link-offset-2 link-underline-opacity-0 link-underline-opacity-100-hover">All<i class="fa-solid fa-arrow-right ms-2"></i></a>
          </p>
        </div>
          <div class="gallery-container">
            <div class="gallery-wrapper">
              <img src="img/gallery-img.png" alt="Image 1" class="gallery-image img-fluid">
              <img src="img/gallery-img-2.png" alt="Image 2" class="gallery-image img-fluid">
              <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
              <img src="img/gallery-img-2.png" alt="Image 2" class="gallery-image img-fluid">
              <img src="img/gallery-img.png" alt="Image 3" class="gallery-image img-fluid">
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="music-player-footer position-fixed py-1" style="height: 10vh;">
      <div class="container d-flex justify-content-between align-items-center pt-2">
        <div class="col player-info">
          <div class="artist-name">Group Name</div>
          <div class="track-name">Track Title</div>
          <button class="btn rounded-circle position-absolute footer-btn">
            <i class="fa-solid fa-circle-play" style="font-size: 4rem; color: #8f129a;"></i>
          </button>
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>    
    <script src="js/index.js"></script>

</html>
