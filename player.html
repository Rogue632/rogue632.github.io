<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Radio</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    </head>
    <body >
        <div class="player flex-column pt-3">
            <!-- Контент плеера -->
            <div class="container">
                <div class="row flex-column position-relative">
                    <div class="col mb-4">
                        <img src="img/slider.png" class="rounded-3" style="height: 280px;" alt="">
                    </div>
                    <div class="col text-white text-center mb-4">
                    <h5 class="mb-2">Europa Plus FM</h5>
                    <p class="mb-4">Music</p>
                    <div class="mb-4">
                        <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                        <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                        <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                        <i class="fa-solid fa-star" style="color: #ffb83d;"></i>
                        <i class="fa-regular fa-star" style="color: #9e69a7;"></i>
                    </div>
                    <h6 class="mb-2">Angelina Show - Go Home</h6>
                </div>
                <div class="col text-center mb-3">
                    <button class="btn rounded-circle" style="width: 80px; height: 80px; background-color: white; border: none;">
                        <i class="fa-solid fa-play fa-2xl ps-2" style="color: #8f129a; font-size: 2.5rem;"></i>
                    </button>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>    
        <script src="js/index.js"></script>  
    </body>
</html>
